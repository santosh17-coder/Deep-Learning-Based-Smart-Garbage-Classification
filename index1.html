<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Smart Garbage Classification</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom right, #dfe9f3, #ffffff);
      text-align: center;
      padding: 40px 20px;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 30px;
    }

    .bins {
      display: flex;
      justify-content: center;
      gap: 80px;
      margin-bottom: 40px;
    }

    .bin {
      width: 120px;
      height: 180px;
      position: relative;
      transition: transform 2s ease;
    }

    .cap {
      width: 120px;
      height: 35px;
      background: #7f8c8d;
      border-radius: 10px 10px 0 0;
      position: absolute;
      top: 0;
      left: 0;
      transition: transform 0.5s ease;
      transform-origin: top center;
      z-index: 2;
    }

    .cap.open {
      transform: rotateX(60deg);
    }

    .body {
      width: 120px;
      height: 145px;
      position: absolute;
      bottom: 0;
      border-radius: 0 0 15px 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      font-weight: bold;
    }

    .red .body { background-color: #e74c3c; }
    .blue .body { background-color: #3498db; }
    .green .body { background-color: #2ecc71; }

    .body::before {
      content: "♻️";
      font-size: 24px;
    }

    .form-container {
      margin-top: 30px;
    }

    label.upload-label, .capture-btn, .snap-btn {
      display: inline-block;
      padding: 12px 24px;
      background: #2980b9;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
    }

    input[type="file"] {
      display: none;
    }

    .submit-button {
      padding: 12px 24px;
      font-size: 16px;
      background-color: #27ae60;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .submit-button:hover {
      background-color: #1e8449;
    }

    video, canvas {
      display: none;
      margin: 20px auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <h1>Garbage Classification System</h1>

  <div class="bins">
    <div class="bin red">
      <div class="cap" id="cap-red"></div>
      <div class="body">Red</div>
    </div>
    <div class="bin blue">
      <div class="cap" id="cap-blue"></div>
      <div class="body">Blue</div>
    </div>
    <div class="bin green">
      <div class="cap" id="cap-green"></div>
      <div class="body">Green</div>
    </div>
  </div>

  <div class="form-container">
    <form id="upload-form" action="/predict" method="POST" enctype="multipart/form-data">
      <!-- Upload from files -->
      <label for="file-input" class="upload-label">Choose Image from Files</label>
      <input type="file" id="file-input" name="file" accept="image/*">

      <!-- Webcam capture -->
      <button type="button" class="capture-btn" onclick="startCamera()">📷 Capture from Webcam</button>
      <video id="video" width="320" height="240" autoplay></video>
      <br>
      <button type="button" class="snap-btn" id="snap-btn" onclick="takeSnapshot()" style="display: none;">📸 Take Snapshot</button>
      <canvas id="canvas" width="320" height="240"></canvas>

      <input type="hidden" name="webcam_image" id="webcam-image">

      <br><br>
      <button type="submit" class="submit-button">Classify Image</button>
    </form>
  </div>

  <script>
    const caps = [
      document.getElementById("cap-red"),
      document.getElementById("cap-blue"),
      document.getElementById("cap-green")
    ];
  
    // Open lids by default
    caps.forEach(cap => cap.classList.add("open"));
  
    // Function to close lids and rotate bins
    function closeLidsAndRotate() {
      caps.forEach(cap => cap.classList.remove("open"));
      const bins = document.querySelectorAll('.bin');
      bins.forEach(bin => {
        bin.style.transform = 'rotate(360deg)';
        setTimeout(() => {
          bin.style.transform = 'rotate(0deg)';
        }, 2000); // Reset rotation after 2s
      });
    }
  
    // On file chosen, close lids and rotate bins
    document.getElementById("file-input").addEventListener("change", () => {
      closeLidsAndRotate();
    });
  
    // Webcam logic remains unchanged
    let videoStream = null;
  
    function startCamera() {
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const snapBtn = document.getElementById("snap-btn");
  
      video.style.display = "block";
      canvas.style.display = "none";
      snapBtn.style.display = "inline-block";
  
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
          videoStream = stream;
          video.srcObject = stream;
        })
        .catch(err => alert("Camera not accessible: " + err));
    }
  
    function takeSnapshot() {
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  
      canvas.style.display = "block";
      video.style.display = "none";
      document.getElementById("snap-btn").style.display = "none";
  
      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
      }
  
      const dataURL = canvas.toDataURL("image/png");
      document.getElementById("webcam-image").value = dataURL;
  
      const a = document.createElement('a');
      a.href = dataURL;
      a.download = 'snapshot.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
  
      closeLidsAndRotate();
    }
  </script>
  

</body>
</html>
